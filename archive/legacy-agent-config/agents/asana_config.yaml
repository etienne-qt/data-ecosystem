# Asana integration configuration for ecosystem agent tasks.
#
# Maps agent task names to Asana project structure.
# The agent runner uses these mappings when polling Asana for work
# and when posting results back as comments.

# Asana workspace and project (also configured via .env)
workspace_gid: ${ASANA_WORKSPACE_GID}
project_gid: ${ASANA_PROJECT_GID}

# Tag used to identify tasks the agent should pick up
agent_tag: "agent"

# Task name mappings — Asana task names → registered task names
# The agent normalizes Asana task names (lowercase, spaces→underscores)
# before looking up in the registry. These aliases handle non-standard names.
task_aliases:
  "sync hubspot": "nightly_sync"
  "hubspot sync": "nightly_sync"
  "classify": "classify_new"
  "classify companies": "classify_new"
  "match": "match_resolve"
  "entity matching": "match_resolve"
  "generate report": "report_gen"
  "weekly report": "report_gen"
  "ingest notes": "notes_ingest"
  "meeting notes": "notes_ingest"

# Per-task Asana behavior
tasks:
  nightly_sync:
    auto_complete: true          # Mark Asana task complete on success
    post_comment: true           # Post result as comment
    notify_on_failure: true      # @mention assignee on failure

  classify_new:
    auto_complete: true
    post_comment: true
    notify_on_failure: true

  match_resolve:
    auto_complete: true
    post_comment: true
    notify_on_failure: true

  report_gen:
    auto_complete: false         # Keep open — reports are recurring
    post_comment: true
    notify_on_failure: true

  notes_ingest:
    auto_complete: true
    post_comment: true
    notify_on_failure: false
