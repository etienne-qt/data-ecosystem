repos:
  - repo: local
    hooks:
      - id: check-data-files
        name: Block data files outside public-data/
        entry: python pipelines/validation/hooks/check_data_files.py
        language: system
        pass_filenames: false
        always_run: true

      - id: check-file-size
        name: Warn on files larger than 1 MB (outside reports/)
        entry: python pipelines/validation/hooks/check_file_size.py
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-taxonomy
        name: Validate taxonomy/*.yaml structure
        entry: python pipelines/validation/hooks/validate_taxonomy.py
        language: system
        pass_filenames: false
        files: ^taxonomy/.*\.yaml$
